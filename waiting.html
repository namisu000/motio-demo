<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motio — Preparing</title>
<link rel="stylesheet" href="shared.css">
<style>
.waiting-page {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; background: #fff;
}

.waiting-box {
  width: 480px; text-align: center;
  animation: fade-up 0.4s ease both;
}

/* Spinner */
.spinner {
  width: 52px; height: 52px; margin: 0 auto 28px;
  border: 3px solid var(--border);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

.w-label {
  font-size: 11px; font-weight: 600; color: var(--brand);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.w-title {
  font-size: 22px; font-weight: 600; color: var(--text-1);
  margin-bottom: 6px;
}
.w-desc { font-size: 13px; color: var(--text-3); margin-bottom: 28px; line-height: 1.6; }

/* Steps */
.step-row {
  display: flex; gap: 0; margin-bottom: 24px;
  position: relative;
}
.step-row::before {
  content: ''; position: absolute; top: 16px; left: 16px; right: 16px;
  height: 1px; background: var(--border);
}
.w-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; z-index: 1; }
.w-step-node {
  width: 32px; height: 32px; border-radius: 50%;
  background: #fff; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--text-4);
  transition: all 0.3s;
}
.w-step.done .w-step-node { border-color: var(--success); background: #d1fae5; color: var(--success); }
.w-step.active .w-step-node { border-color: var(--brand); background: var(--brand-light); color: var(--brand); animation: blink 1.2s infinite; }
.w-step-lbl { font-size: 10px; color: var(--text-4); text-align: center; max-width: 60px; }
.w-step.done .w-step-lbl { color: var(--success); }
.w-step.active .w-step-lbl { color: var(--brand); }

/* Progress bar */
.w-prog { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
.w-prog-fill { height: 100%; background: var(--brand); border-radius: 2px; transition: width 0.5s ease; }

/* Context */
.w-context {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap;
}

.w-status { font-size: 12px; color: var(--text-3); margin-bottom: 24px; min-height: 18px; }
.w-status span { color: var(--brand); font-weight: 500; }

.click-hint {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg-sub);
  font-size: 12px; color: var(--text-3);
}
.click-hint kbd {
  background: #fff; border: 1px solid var(--border-mid);
  border-radius: 3px; padding: 1px 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-2);
}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="upload.html"><div class="nav-logo-mark">M</div>Motio</a>
  <div class="nav-steps">
    <div class="nav-step done"><span class="dot"></span>Upload</div>
    <div class="nav-step done"><span class="dot"></span>Clip Range</div>
    <div class="nav-step done"><span class="dot"></span>Detect</div>
    <div class="nav-step active"><span class="dot"></span>Extract</div>
    <div class="nav-step"><span class="dot"></span>Result</div>
  </div>
  <div class="nav-right"><span class="badge badge-orange">Preparing</span></div>
</nav>

<div class="page">
  <div class="waiting-page" id="waitPage">
    <div class="waiting-box">
      <div class="spinner"></div>
      <div class="w-label" id="wLabel">Initializing</div>
      <div class="w-title">Preparing Motion Extraction</div>
      <div class="w-desc">Loading the motion analysis model and preparing your video segment.</div>

      <div class="w-context">
        <span class="badge badge-gray" id="wFile">—</span>
        <span class="badge badge-blue" id="wRange">—</span>
        <span class="badge badge-blue" id="wTarget">—</span>
      </div>

      <div class="step-row">
        <div class="w-step done" id="ws1"><div class="w-step-node">✓</div><div class="w-step-lbl">Upload</div></div>
        <div class="w-step done" id="ws2"><div class="w-step-node">✓</div><div class="w-step-lbl">Trimmed</div></div>
        <div class="w-step active" id="ws3"><div class="w-step-node">⚙</div><div class="w-step-lbl">Loading</div></div>
        <div class="w-step" id="ws4"><div class="w-step-node">4</div><div class="w-step-lbl">Pose Init</div></div>
        <div class="w-step" id="ws5"><div class="w-step-node">5</div><div class="w-step-lbl">Object Lock</div></div>
      </div>

      <div class="w-prog"><div class="w-prog-fill" id="wFill" style="width:35%"></div></div>

      <div class="w-status" id="wStatus">Loading <span>MotionBERT</span> checkpoint...</div>

      <div class="click-hint"><kbd>Click anywhere</kbd> to skip and proceed</div>
    </div>
  </div>
</div>

<script>
const fn    = localStorage.getItem('motio_fileName')      || 'sample.mp4';
const start = localStorage.getItem('motio_startTime')     || '00:03';
const end   = localStorage.getItem('motio_endTime')       || '00:12';
const label = localStorage.getItem('motio_selectedLabel') || 'Person 01';
document.getElementById('wFile').textContent   = fn;
document.getElementById('wRange').textContent  = start + ' → ' + end;
document.getElementById('wTarget').textContent = label;

const msgs = [
  { pct:35, txt:'Loading <span>MotionBERT</span> checkpoint...' },
  { pct:52, txt:'Initializing <span>COCO-17</span> skeleton model...' },
  { pct:67, txt:'Parsing video segment <span>' + start + '→' + end + '</span>...' },
  { pct:80, txt:'Calibrating <span>pose estimator</span>...' },
  { pct:92, txt:'Locking target: <span>' + label + '</span>...' },
];
let mi = 0;
const fill = document.getElementById('wFill');
const status = document.getElementById('wStatus');

function activateStep(done, active) {
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('ws'+i);
    const node = el.querySelector('.w-step-node');
    if (i <= done) { el.className='w-step done'; node.textContent='✓'; }
    else if (i === active) { el.className='w-step active'; node.textContent='⚙'; }
    else { el.className='w-step'; node.textContent=i; }
  }
}

const t = setInterval(() => {
  if (mi < msgs.length) {
    const m = msgs[mi];
    fill.style.width = m.pct + '%';
    status.innerHTML = m.txt;
    if (mi === 2) activateStep(3, 4);
    if (mi === 4) activateStep(4, 5);
    mi++;
  }
}, 900);

document.getElementById('waitPage').addEventListener('click', () => { clearInterval(t); window.location.href = 'processing.html'; });
</script>
</body>
</html>
